<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Rendi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- AOS (Animasi) -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <h2>Rendi</h2>
    <div>
        <button onclick="toggleDarkMode()">🌙</button>
    </div>
</nav>

<!-- HERO -->
<section class="hero" data-aos="fade-up">
    <h1>Halo, Saya Rendi</h1>
    <p>Mahasiswa Sistem Informasi</p>
</section>

<!-- PROJECT -->
<section class="project">
    <h2 data-aos="fade-up">Project Saya</h2>
    <div id="project-list" class="card-container"></div>
</section>

<!-- CONTACT -->
<section class="contact" data-aos="fade-up">
    <h2>Contact</h2>
    <form onsubmit="kirimPesan(event)">
        <input type="text" placeholder="Nama" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Pesan" required></textarea>
        <button type="submit">Kirim</button>
    </form>
    <section class="profile">
    <img src="https://via.placeholder.com/150" class="foto">
    <h2>Rendi Putra</h2>
    <p>Mahasiswa Sistem Informasi | Web Developer</p>

    <div class="social">
        <a href="#">LinkedIn</a>
        <a href="#">GitHub</a>
    </div>
</section>
</section>

<!-- SCRIPT -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="script.js"></script>

</body>
</html>
